name: Daily Monitoring - Security & Data Integrity

on:
  schedule:
    # 매일 자정(UTC), 오전 6시(UTC), 오후 6시(UTC) 실행
    - cron: '0 0 * * *'
    - cron: '0 6 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

env:
  NODE_ENV: production
  NODE_VERSION: "20"

jobs:
  # 1. API 엔드포인트 보안 감시
  api-security-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}    # 수정: 18 → 20 (Prisma 7 요구사항)

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check API response times
        run: |
          cat > check-api-perf.js << 'EOF'
          const https = require('https');
          const baseUrl = 'https://mabizcruisedot.com';
          const endpoints = [
            { path: '/api/health', timeout: 2000 },
            { path: '/api/groups', timeout: 3000 },
            { path: '/api/contacts', timeout: 3000 },
            { path: '/api/partner/dashboard/b2b', timeout: 3000 },
            { path: '/api/campaigns', timeout: 3000 },
            { path: '/api/admin/organizations', timeout: 3000 }
          ];

          const results = [];
          let failCount = 0;

          const check = (endpoint) => {
            return new Promise((resolve) => {
              const startTime = Date.now();
              const req = https.get(baseUrl + endpoint.path, {
                headers: {
                  'Authorization': `Bearer ${process.env.API_TEST_TOKEN || ''}`,
                  'User-Agent': 'GitHub-Actions-Health-Check'
                },
                timeout: endpoint.timeout
              }, (res) => {
                const duration = Date.now() - startTime;
                const status = res.statusCode;
                const isOk = (status === 200 || status === 401 || status === 400);
                const isSloww = duration > 2500;

                results.push({
                  endpoint: endpoint.path,
                  status,
                  duration,
                  ok: isOk && !isSloww,
                  severity: isSloww ? 'SLOW' : 'OK'
                });

                if (!isOk) failCount++;
                if (isSloww) {
                  console.log(`⚠️ SLOW: ${endpoint.path} (${duration}ms > ${endpoint.timeout}ms)`);
                }

                resolve();
              });

              req.on('timeout', () => {
                results.push({
                  endpoint: endpoint.path,
                  status: 0,
                  duration: endpoint.timeout,
                  ok: false,
                  severity: 'TIMEOUT'
                });
                failCount++;
                req.destroy();
                resolve();
              });

              req.on('error', (e) => {
                results.push({
                  endpoint: endpoint.path,
                  status: 0,
                  duration: 0,
                  ok: false,
                  severity: 'ERROR',
                  error: e.message
                });
                failCount++;
                resolve();
              });
            });
          };

          Promise.all(endpoints.map(check)).then(() => {
            console.log('\n=== API Performance Report ===');
            results.forEach(r => {
              const icon = r.ok ? '✅' : '❌';
              console.log(`${icon} ${r.endpoint}: ${r.status || 'N/A'} (${r.duration}ms) - ${r.severity}`);
            });

            console.log(`\n=== Summary ===`);
            console.log(`Total: ${results.length}, Failed: ${failCount}`);

            if (failCount > 0) {
              console.log('\n⚠️ Some endpoints failed!');
              process.exit(1);
            }
          });
          EOF
          node check-api-perf.js
        env:
          API_TEST_TOKEN: ${{ secrets.API_TEST_TOKEN }}

      - name: Notify Slack - API Check Failed
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🔴 API Security/Performance Check Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*🔴 API Health Check FAILED*\n*Run:* #${{ github.run_number }}\n*Details:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Log>"
                  }
                }
              ]
            }
        continue-on-error: true

  # 2. 데이터베이스 무결성 검사
  database-integrity-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}    # 수정: 18 → 20 (Prisma 7 요구사항)
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check database connection
        run: |
          cat > check-db-integrity.js << 'EOF'
          const { createClient } = require('@supabase/supabase-js');

          const supabase = createClient(
            process.env.NEXT_PUBLIC_SUPABASE_URL || '',
            process.env.SUPABASE_SERVICE_ROLE_KEY || ''
          );

          // 실제 Prisma @@map 기준 테이블명 (PascalCase)
          const TABLES = [
            'Contact',
            'ContactGroup',
            'CrmAffiliateSale',
            'Organization',
            'CallLog',
            'CommissionLedger',
            'Payment',
            'Partner'
          ];

          async function checkTable(tableName) {
            try {
              const { count, error } = await supabase
                .from(tableName)
                .select('*', { count: 'exact', head: true });
              return { table: tableName, ok: !error, message: error?.message || 'OK', count: count ?? 0 };
            } catch (e) {
              return { table: tableName, ok: false, message: String(e), count: 0 };
            }
          }

          async function run() {
            if (!process.env.NEXT_PUBLIC_SUPABASE_URL || !process.env.SUPABASE_SERVICE_ROLE_KEY) {
              console.log('⚠️ Supabase env vars not set — skipping DB integrity check');
              process.exit(0);
            }

            console.log('Starting DB Integrity Check...\n');
            const results = await Promise.all(TABLES.map(checkTable));

            let errorCount = 0;
            results.forEach(r => {
              const icon = r.ok ? '✅' : '❌';
              console.log(`${icon} ${r.table}: ${r.message} (${r.count} rows)`);
              if (!r.ok) errorCount++;
            });

            console.log(`\n=== Summary ===`);
            console.log(`Total: ${results.length}, Errors: ${errorCount}`);
            if (errorCount > 0) process.exit(1);
          }

          run().catch(e => { console.error('Fatal:', e); process.exit(1); });
          EOF
          node check-db-integrity.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Check for duplicate records
        run: |
          cat > check-duplicates.js << 'EOF'
          const { createClient } = require('@supabase/supabase-js');

          const supabase = createClient(
            process.env.NEXT_PUBLIC_SUPABASE_URL || '',
            process.env.SUPABASE_SERVICE_ROLE_KEY || ''
          );

          async function checkDuplicates() {
            if (!process.env.NEXT_PUBLIC_SUPABASE_URL) {
              console.log('⚠️ Supabase URL not set — skipping duplicate check');
              return;
            }

            const checks = [
              { table: 'Contact', field: 'phone', label: 'Contact.phone 중복' },
              { table: 'Partner', field: 'affiliateCode', label: 'Partner.affiliateCode 중복' },
            ];

            let warnCount = 0;
            for (const c of checks) {
              try {
                const { error } = await supabase
                  .from(c.table)
                  .select(c.field)
                  .not(c.field, 'is', null)
                  .limit(1);
                if (error) { console.log(`⚠️ ${c.label}: ${error.message}`); warnCount++; }
                else { console.log(`✅ ${c.label}: 접근 OK`); }
              } catch (e) {
                console.log(`⚠️ ${c.label}: ${String(e)}`); warnCount++;
              }
            }
            console.log(`\nDuplicate check done. Warnings: ${warnCount}`);
          }

          checkDuplicates().catch(e => { console.error('Fatal:', e); process.exit(1); });
          EOF
          node check-duplicates.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        continue-on-error: true

      - name: Notify Slack - DB Check Failed
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🔴 Database Integrity Check Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*🔴 Database Integrity FAILED*\n*Details:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Log>"
                  }
                }
              ]
            }
        continue-on-error: true

  # 3. 에러 추적 - Sentry 동기화
  error-tracking-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check Sentry for critical errors
        run: |
          cat > check-sentry.js << 'EOF'
          const https = require('https');

          const options = {
            hostname: 'sentry.io',
            path: '/api/0/organizations/${{ secrets.SENTRY_ORG_SLUG }}/events/',
            method: 'GET',
            headers: {
              'Authorization': `Bearer ${{ secrets.SENTRY_AUTH_TOKEN }}`,
              'User-Agent': 'GitHub-Actions'
            }
          };

          const req = https.request(options, (res) => {
            let data = '';
            res.on('data', chunk => data += chunk);
            res.on('end', () => {
              try {
                const events = JSON.parse(data);
                console.log('=== Sentry Error Summary (Last 24h) ===');

                const criticalErrors = events.filter(e => e.level === 'fatal' || e.level === 'error');
                const warnings = events.filter(e => e.level === 'warning');

                console.log(`Critical/Error: ${criticalErrors.length}`);
                console.log(`Warnings: ${warnings.length}`);

                criticalErrors.slice(0, 5).forEach(e => {
                  console.log(`  ❌ ${e.title} (${e.platform}) - ${new Date(e.dateCreated).toISOString()}`);
                });

                if (criticalErrors.length > 5) {
                  process.exit(1);
                }
              } catch (e) {
                console.log('Sentry API check (skipped - no auth)');
              }
            });
          });

          req.on('error', () => {
            console.log('Sentry sync skipped (network)');
          });

          req.end();
          EOF
          node check-sentry.js
        continue-on-error: true

  # 4. 성능 메트릭 추적
  performance-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12    # 수정: v10 → v12 (upload-artifact@v3 deprecated 해결)
        with:
          configPath: './lighthouserc.json'
          uploadArtifacts: false                  # 수정: true → false (upload-artifact@v3 사용 차단)
        continue-on-error: true

      - name: Check memory usage
        run: |
          echo "=== Memory Check ==="
          free -h || echo "Memory info unavailable"
        shell: bash

      - name: Archive performance results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-metrics-${{ github.run_number }}
          path: './.lighthouseci/'
        continue-on-error: true

  # 5. 요약 및 슬랙 알림
  summary:
    runs-on: ubuntu-latest
    needs: [api-security-check, database-integrity-check, error-tracking-sync, performance-check]
    if: always()
    steps:
      - name: Determine overall status
        run: |
          if [ "${{ needs.api-security-check.result }}" = "failure" ] || \
             [ "${{ needs.database-integrity-check.result }}" = "failure" ]; then
            echo "STATUS=CRITICAL" >> $GITHUB_ENV
            echo "EMOJI=🔴" >> $GITHUB_ENV
          elif [ "${{ needs.error-tracking-sync.result }}" = "failure" ]; then
            echo "STATUS=WARNING" >> $GITHUB_ENV
            echo "EMOJI=🟠" >> $GITHUB_ENV
          else
            echo "STATUS=OK" >> $GITHUB_ENV
            echo "EMOJI=🟢" >> $GITHUB_ENV
          fi

      - name: Send Slack summary
        uses: slackapi/slack-github-action@v1.27.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ env.EMOJI }} Daily Monitoring Summary",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*${{ env.EMOJI }} Daily Monitoring - ${{ env.STATUS }}*\n\n*API Security:* ${{ needs.api-security-check.result }}\n*DB Integrity:* ${{ needs.database-integrity-check.result }}\n*Error Tracking:* ${{ needs.error-tracking-sync.result }}\n*Performance:* ${{ needs.performance-check.result }}\n\n*Run:* #${{ github.run_number }}\n*Details:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                  }
                }
              ]
            }
        continue-on-error: true
