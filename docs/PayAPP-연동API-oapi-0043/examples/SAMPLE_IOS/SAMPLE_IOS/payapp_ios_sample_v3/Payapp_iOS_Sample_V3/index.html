<!DOCTYPE html>
<html>
<head>
    <title>페이앱</title>
    <meta charset="utf-8">
        <style>
            a {
                font-size: 25px;
            }
        </style>
        <script>
           function call(reqType, isAllPayReqType) {
               document.location.href = "https://payapp.kr/sdk-app?reqType="+reqType+ "&isAllPayReqType=" + isAllPayReqType +"&phoneNumber=01000000000&goodPrice=10000&goodName="+reqType+" 테스트&hasTax=1&returnUri=https://my_returnUrl.kr&var1="+reqType+" test&var2=var2 test&feedbackurl=https://IOS_feedbackUrl.kr&checkretry=n"
           }
        </script>
</head>
<body>
    <a href="javascript:void(0);" onclick="call('REMOTE', '0')">원격결제</a>
    <br/>
    <a href="javascript:void(0);" onclick="call('OCR', '0')">카메라결제</a>
    <br/>

    <br/>
    <a href="javascript:void(0);" onclick="call('MANUAL', '0')">수기결제</a>
    <br/>
    <a href="javascript:void(0);" onclick="call('NAVER_PAY', '0')">네이버페이</a>
    <br/>
    <a href="javascript:void(0);" onclick="call('KAKAO_PAY', '0')">카카오페이</a>
    <br/>
    <a href="javascript:void(0);" onclick="call('SMILE_PAY', '0')">스마일페이</a>
    <br/>
    <a href="javascript:void(0);" onclick="call('APPLE_PAY', '0')">애플페이</a>
    <br/>
    <a href="javascript:void(0);" onclick="call('PAYCO', '0')">페이코</a>
    <br/>
    <a href="javascript:void(0);" onclick="call('WECHAT_PAY', '0')">위챗페이</a>
    <br/>
    <a href="javascript:void(0);" onclick="call('MY_ACCOUNT', '0')">내통장결제</a>
    <br/>
    <a href="javascript:void(0);" onclick="call('TOSS_PAY', '0')">토스페이</a>

</html>
